<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proforma Fatura Üreteci</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root {
–bg: #0d0d0d;
–surface: #161616;
–surface2: #1e1e1e;
–border: #282828;
–border2: #333;
–accent: #c8a96e;
–accent-dim: rgba(200,169,110,0.12);
–accent2: #5e9fb5;
–text: #e6e2da;
–muted: #777;
–muted2: #555;
–red: #d06060;
}

- { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(–bg); color: var(–text); font-family: ‘IBM Plex Sans’, sans-serif; min-height: 100vh; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }

/* ─── HEADER ─── */
header {
padding: 0 28px;
height: 58px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 14px;
background: var(–surface);
position: sticky; top: 0; z-index: 10;
}
.logo {
width: 32px; height: 32px;
background: var(–accent);
display: grid; place-items: center;
font-family: ‘IBM Plex Mono’, monospace;
font-weight: 600; font-size: 12px; color: #0d0d0d;
flex-shrink: 0;
}
header h1 {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 12px; font-weight: 500;
color: var(–accent); letter-spacing: 2.5px; text-transform: uppercase;
}
.date-badge {
margin-left: auto;
font-family: ‘IBM Plex Mono’, monospace; font-size: 11px;
color: var(–muted); background: var(–bg);
border: 1px solid var(–border2); padding: 5px 12px;
}

/* ─── LAYOUT ─── */
.main { display: flex; flex: 1; }

.panel-left {
width: 320px; min-width: 320px;
border-right: 1px solid var(–border);
background: var(–surface);
display: flex; flex-direction: column;
overflow-y: auto;
height: calc(100vh - 58px);
position: sticky; top: 58px;
}

.panel-right {
flex: 1;
overflow-y: auto;
background: var(–bg);
}

/* ─── FORM SECTIONS ─── */
.section { padding: 16px 20px; border-bottom: 1px solid var(–border); }

.section-label {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 9px; font-weight: 600;
letter-spacing: 3px; text-transform: uppercase;
color: var(–muted); margin-bottom: 11px;
display: flex; align-items: center; gap: 8px;
}
.section-label::after { content:’’; flex:1; height:1px; background: var(–border2); }

/* ─── FIRMA GRID ─── */
.firm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

.firm-btn {
background: var(–bg);
border: 1px solid var(–border2);
color: var(–muted);
padding: 9px 5px;
font-family: ‘IBM Plex Mono’, monospace; font-size: 10px;
cursor: pointer; transition: all 0.15s; text-align: center;
letter-spacing: 0.5px;
}
.firm-btn:hover { border-color: var(–accent); color: var(–accent); background: var(–accent-dim); }
.firm-btn.active {
background: var(–accent); border-color: var(–accent);
color: #0d0d0d; font-weight: 600;
}

.firma-info {
background: var(–bg); border: 1px solid var(–border2);
border-top: 2px solid var(–accent);
padding: 10px 12px; margin-top: 8px;
font-size: 10.5px; line-height: 1.75; color: var(–muted);
font-family: ‘IBM Plex Mono’, monospace; display: none;
}
.firma-info.show { display: block; }
.firma-info strong { color: var(–text); font-size: 10.5px; display: block; margin-bottom: 3px; }
.firma-info .iban-line { color: var(–accent2); font-size: 10px; margin-top: 2px; }

/* ─── TUTAR ─── */
.input-group label {
display: block; font-family: ‘IBM Plex Mono’, monospace;
font-size: 9px; color: var(–muted); letter-spacing: 1.5px; margin-bottom: 6px;
}
.tutar-wrap { position: relative; }
.tutar-wrap input {
width: 100%; background: var(–bg); border: 1px solid var(–border2);
border-bottom: 2px solid var(–accent);
color: var(–accent); padding: 12px 48px 12px 14px;
font-family: ‘IBM Plex Mono’, monospace; font-size: 24px; font-weight: 600;
outline: none; text-align: right; letter-spacing: -0.5px;
transition: border-color 0.15s;
}
.tutar-wrap input:focus { border-color: var(–accent); }
.tutar-wrap input::placeholder { color: #333; }
.tutar-wrap .currency {
position: absolute; right: 12px; top: 50%;
transform: translateY(-50%);
font-family: ‘IBM Plex Mono’, monospace; font-size: 12px; color: var(–muted);
}

/* ─── BUTTON ─── */
.gen-btn {
width: 100%; background: var(–accent); border: none; color: #0d0d0d;
padding: 15px; font-family: ‘IBM Plex Mono’, monospace;
font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
cursor: pointer; transition: all 0.18s;
display: flex; align-items: center; justify-content: center; gap: 8px;
}
.gen-btn:hover { background: #d9ba7f; transform: translateY(-1px); }
.gen-btn:active { transform: translateY(0); }
.gen-btn:disabled { background: #2a2a20; color: #555; cursor: not-allowed; transform: none; }

/* ─── EMPTY STATE ─── */
.empty-state {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
min-height: calc(100vh - 100px);
gap: 16px; color: var(–muted); padding: 40px;
}
.empty-state .icon { font-size: 40px; opacity: 0.2; }
.empty-state p {
font-family: ‘IBM Plex Mono’, monospace; font-size: 10px;
letter-spacing: 2px; text-align: center; line-height: 2.2; text-transform: uppercase;
}

/* ─── PREVIEW TOOLBAR ─── */
.preview-toolbar {
padding: 10px 24px; border-bottom: 1px solid var(–border);
background: var(–surface);
display: flex; align-items: center; gap: 10px;
position: sticky; top: 0; z-index: 5;
}
.preview-toolbar span { font-family: ‘IBM Plex Mono’, monospace; font-size: 10px; color: var(–muted); letter-spacing: 2px; }
.tool-btn {
background: var(–bg); border: 1px solid var(–border2); color: var(–text);
padding: 6px 16px; font-family: ‘IBM Plex Mono’, monospace; font-size: 10px;
cursor: pointer; transition: all 0.15s; letter-spacing: 1px;
}
.tool-btn:hover { border-color: var(–accent); color: var(–accent); }
.tool-btn.primary {
background: var(–accent); border-color: var(–accent);
color: #0d0d0d; font-weight: 600;
}
.tool-btn.primary:hover { background: #d9ba7f; }

.err {
background: #1e0e0e; border-left: 3px solid var(–red); color: var(–red);
padding: 10px 16px; font-family: ‘IBM Plex Mono’, monospace; font-size: 11px;
margin: 16px 24px; display: none;
}

/* ─── PREVIEW WRAP ─── */
.preview-wrap { padding: 32px 24px; }

/* ════════════════════════════════════════
PROFORMA BELGE — yeni tasarım
════════════════════════════════════════ */
.proforma-page {
background: #fff;
width: 100%;
max-width: 800px;
margin: 0 auto;
font-family: ‘IBM Plex Sans’, sans-serif;
color: #111;
box-shadow: 0 8px 60px rgba(0,0,0,0.55);
position: relative;
overflow: hidden;
}

/* Üst renkli bant */
.pf-topbar {
background: #1a1a2e;
height: 8px;
background: linear-gradient(90deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
}

/* İç padding alanı */
.pf-body { padding: 40px 48px 44px; }

/* ─── HEADER ─── */
.pf-header {
display: grid;
grid-template-columns: 1fr auto;
gap: 32px;
align-items: start;
margin-bottom: 32px;
padding-bottom: 24px;
border-bottom: 1px solid #e0e0e0;
position: relative;
}

.pf-satici-unvan {
font-size: 15px; font-weight: 600; color: #0f3460;
letter-spacing: -0.2px; margin-bottom: 6px;
}
.pf-satici-det {
font-size: 11px; color: #666; line-height: 1.8;
font-family: ‘IBM Plex Mono’, monospace;
}

.pf-title-block { text-align: right; }
.pf-title {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 20px; font-weight: 600;
letter-spacing: 4px; color: #0f3460;
margin-bottom: 8px;
}
.pf-tarih-badge {
display: inline-block;
background: #f5f0e8;
border: 1px solid #d4b896;
padding: 4px 12px;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 11px; color: #8a6a3a;
letter-spacing: 1px;
}

/* ─── ALICI ─── */
.pf-alici-wrap {
margin-bottom: 32px;
}

.pf-alici-label {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 8px; letter-spacing: 3px; color: #999;
text-transform: uppercase; margin-bottom: 0;
}

.pf-alici-card {
border: 1px solid #e0e0e0;
border-left: 4px solid #0f3460;
padding: 16px 20px;
background: #f9f9fb;
display: flex;
align-items: flex-start;
gap: 20px;
margin-top: 8px;
}

.pf-alici-icon {
width: 36px; height: 36px;
background: #0f3460;
color: white;
display: grid; place-items: center;
font-size: 14px;
flex-shrink: 0;
margin-top: 2px;
}

.pf-alici-name { font-size: 13px; font-weight: 600; color: #111; margin-bottom: 4px; }
.pf-alici-det { font-size: 11px; color: #666; line-height: 1.7; }
.pf-alici-vkn {
display: inline-block;
margin-top: 4px;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 10px; color: #888;
}

/* ─── TABLO ─── */
.pf-table {
width: 100%; border-collapse: collapse;
margin-bottom: 0;
}

.pf-table thead tr {
background: #0f3460;
}
.pf-table thead th {
padding: 11px 14px;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 9px; letter-spacing: 1.5px;
font-weight: 500; color: rgba(255,255,255,0.85);
text-transform: uppercase;
}
.pf-table thead th.r { text-align: right; }

.pf-table tbody tr { border-bottom: 1px solid #efefef; }
.pf-table tbody tr:nth-child(even) { background: #f8f8fb; }
.pf-table tbody tr:last-child { border-bottom: 2px solid #e0e0e0; }

.pf-table tbody td { padding: 12px 14px; color: #222; font-size: 12.5px; }
.pf-table tbody td.idx {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 10px; color: #bbb; width: 30px;
}
.pf-table tbody td.urun { font-weight: 500; color: #111; }
.pf-table tbody td.num {
text-align: right;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 12px; color: #333;
}
.pf-table tbody td.num.total { color: #0f3460; font-weight: 600; }

/* ─── TOTALLER ─── */
.pf-bottom {
display: grid;
grid-template-columns: 1fr auto;
gap: 32px;
margin-top: 24px;
align-items: start;
}

.pf-totals { width: 280px; }

.pf-total-row {
display: flex; border-bottom: 1px solid #f0f0f0;
}
.pf-total-row .lbl {
flex: 1; padding: 9px 14px;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 10px; color: #777; background: #f7f7f7;
letter-spacing: 0.5px;
}
.pf-total-row .val {
padding: 9px 14px; min-width: 130px; text-align: right;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 11px; font-weight: 500; color: #333;
}
.pf-total-row.genel .lbl {
background: #0f3460; color: rgba(255,255,255,0.8);
font-weight: 600; font-size: 11px; letter-spacing: 1px;
}
.pf-total-row.genel .val {
background: #0f3460; color: #f0c060;
font-weight: 700; font-size: 14px;
}

/* ─── KOŞULLAR ─── */
.pf-conds {
flex: 1;
display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.pf-cond {
font-size: 11px; color: #666; line-height: 1.6;
display: flex; gap: 5px;
}
.pf-cond b { color: #333; white-space: nowrap; font-size: 11px; }

/* ─── BANKA ─── */
.pf-banka {
margin-top: 20px;
background: #f5f0e8;
border: 1px solid #e0d0b0;
padding: 14px 20px;
display: flex; align-items: center; gap: 24px;
flex-wrap: wrap;
}
.pf-banka-title {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 8px; letter-spacing: 2.5px; color: #9a7a4a;
text-transform: uppercase; white-space: nowrap;
}
.pf-banka-sep { width: 1px; height: 28px; background: #d4b896; }
.pf-banka-item {
font-size: 12px; display: flex; gap: 7px; align-items: center;
}
.pf-banka-item b { color: #5a3a10; font-size: 11px; }
.pf-banka-item span {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 11.5px; color: #333; letter-spacing: 1px;
}

/* ─── ALT ─── */
.pf-footer {
margin-top: 32px;
padding-top: 20px;
border-top: 1px dashed #ddd;
display: flex; justify-content: space-between; align-items: flex-end;
}

.pf-imza-box { text-align: center; width: 160px; }
.pf-imza-line { border-bottom: 1px solid #ccc; height: 48px; margin-bottom: 8px; }
.pf-imza-lbl {
font-size: 9px; color: #aaa;
font-family: ‘IBM Plex Mono’, monospace; letter-spacing: 1.5px;
}

.pf-watermark {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 9px; color: #ccc; letter-spacing: 1px;
text-align: center;
}

/* Alt renkli bant */
.pf-botbar {
height: 5px;
background: linear-gradient(90deg, #533483 0%, #0f3460 40%, #16213e 70%, #1a1a2e 100%);
}

/* ─── PRINT ─── */
@media print {
body { background: white !important; }
.panel-left, header, .preview-toolbar { display: none !important; }
.panel-right { overflow: visible; }
.preview-wrap { padding: 0; }
.proforma-page { box-shadow: none; max-width: 100%; }
@page { margin: 6mm; size: A4; }
}
</style>

</head>

<script>
const FIRMALAR = {
  ERTEK: {
    ad:'ERTEK', unvan:'ERTEK TAVUKÇULUK SAN. TİC. LTD. ŞTİ',
    adres:'Gıda Toptancılar sitesi G blok No:10/B Bağlar/Diyarbakır',
    vd:'Gökalp V.D.', vkn:'3720444794',
    iban:'TR09 0020 5000 0962 6568 6000 01', banka:'KUVEYT TÜRK'
  },
  ULTEDA: {

    adres:'Mezopotamya mah 613/4.sk Pia Comsept sitesi A blok no:4 A iç kapı 1 KAYAPINAR DİYARBAKIR',
    vd:'Gökalp V.D.', vkn:'0501428567',
    iban:'TR65 0020 3000 1021 9069 0000 01', banka:'ALBARAKA TÜRK'
  },
  ÖZERTEK: {
    ad:'ÖZERTEK', unvan:'ÖZ ERTEK GIDA PAZ NAK LTD ŞTİ',
    adres:'Yukarıazıklı mah OSB bulvarı MGT sitesi no:41 KIZILTEPE/MARDİN',
    vd:'Gökalp V.D.', vkn:'6620776048',
    iban:'TR31 0020 5000 0962 6570 1000 01', banka:'KUVEYT TÜRK'
  },
  KARAKOÇ: {
    ad:'KARAKOÇ', unvan:'SALİH KARAKOÇ TAVUKÇULUK',
    adres:'ŞEHİDİYE MAH YENİYOL CAD. NO:9/A ARTUKLU/MARDİN',
    vd:'Mardin V.D.', vkn:'25106373636',
    iban:'TR29 0020 5000 0089 0466 9000 01', banka:'KUVEYT TÜRK'
  },
  ALBAYRAK: {
    ad:'ALBAYRAK', unvan:'ALBAYRAKLAR SOS.HİZ.İNŞ.OTO.GIDA TARIM A.Ş.',
    adres:'Mesihpaşa mah Mesihpaşa cd hotel malkoç no:47 içkapı:104 Fatih/İSTANBUL',
    vd:'Beyazıt V.D.', vkn:'1630406928',
    iban:'TR85 0001 0016 2280 7028 9450 02', banka:'T.C. ZİRAAT BANKASI'
  }
};

const URUNLER = [
  { ad:'POŞETLİ BÜTÜN PİLİÇ', fiyat:105 },
  { ad:'PİLİÇ SIRTSIZ GÖĞÜS', fiyat:150 },
  { ad:'PİLİÇ BAGET', fiyat:100 },
  { ad:'PİLİÇ IZGARA KANAT', fiyat:190 },
  { ad:'PİLİÇ SIRTSIZ ÜST BUT', fiyat:130 },
  { ad:'PİLİÇ KALÇALI BUT', fiyat:85 }
];

let satici = null, alici = null;

const today = new Date();
const tarihTR = today.toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit', year:'numeric'});
document.getElementById('hdrDate').textContent = tarihTR;

function buildGrid(gridId, infoId, role) {
  const grid = document.getElementById(gridId);
  Object.keys(FIRMALAR).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'firm-btn';
    btn.textContent = FIRMALAR[key].ad;
    btn.onclick = () => {
      grid.querySelectorAll('.firm-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = FIRMALAR[key];
      const info = document.getElementById(infoId);
      info.innerHTML = `<strong>${f.unvan}</strong>${f.adres}<br>${f.vd} · VKN: ${f.vkn}<div class="iban-line">IBAN: ${f.iban}</div>`;
      info.classList.add('show');
      if (role === 'satici') satici = key; else alici = key;
    };
    grid.appendChild(btn);
  });
}
buildGrid('saticiGrid', 'saticiInfo', 'satici');
buildGrid('aliciGrid', 'aliciInfo', 'alici');

const tutarInp = document.getElementById('tutarInp');
tutarInp.addEventListener('input', function() {
  const raw = this.value.replace(/\D/g,'');
  this.value = raw ? Number(raw).toLocaleString('tr-TR') : '';
});

function parseTutar() {
  return parseInt(tutarInp.value.replace(/\./g,'').replace(/,/g,'')) || 0;
}

function dagilimHesapla(toplam) {
  const kac = toplam > 3000000 ? 4 : toplam > 1000000 ? 3 : 2;
  const karisik = [...URUNLER].sort(() => Math.random() - 0.5).slice(0, kac);
  const weights = karisik.map(() => Math.random() * 0.6 + 0.4);
  const wSum = weights.reduce((a,b) => a+b, 0);
  let kalemler = [], kalan = toplam;
  for (let i = 0; i < karisik.length; i++) {
    const u = karisik[i];
    let tutar;
    if (i === karisik.length - 1) {
      tutar = kalan;
    } else {
      const ham = Math.round((toplam * weights[i] / wSum) / 1000) * 1000;
      const min = 50000;
      const max = kalan - (karisik.length - i - 1) * min;
      tutar = Math.max(min, Math.min(ham, max));
    }
    kalan -= tutar;
    kalemler.push({ urun: u.ad, birimFiyat: u.fiyat, toplamTutar: tutar, miktar: tutar / u.fiyat });
  }
  return kalemler;
}

function generateProforma() {
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';
  if (!satici) { showErr('Lütfen satıcı firma seçin.'); return; }
  if (!alici)  { showErr('Lütfen alıcı firma seçin.'); return; }
  if (satici === alici) { showErr('Satıcı ve alıcı aynı olamaz.'); return; }
  const tutar = parseTutar();
  if (tutar < 10000) { showErr('Geçerli bir tutar girin (min. 10.000 TL).'); return; }
  renderProforma(dagilimHesapla(tutar), tutar);
}

function showErr(msg) {
  const errBox = document.getElementById('errBox');
  errBox.textContent = '⚠ ' + msg;
  errBox.style.display = 'block';
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
}

function fmt(n)   { return n.toLocaleString('tr-TR'); }
function fmtKg(n) { return n.toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderProforma(kalemler, toplam) {
  const S = FIRMALAR[satici];
  const A = FIRMALAR[alici];

  const rows = kalemler.map((k,i) => `
    <tr>
      <td class="idx">${i+1}</td>
      <td class="urun">${k.urun}</td>

      <td class="num">${fmt(k.birimFiyat)} TL</td>

  document.getElementById('previewWrap').innerHTML = `

    <div class="pf-topbar"></div>

          <div class="pf-tarih-badge">TARİH: ${tarihTR}</div>
        </div>
      </div>

      <div class="pf-alici-wrap">
        <div class="pf-alici-label">SAYIN</div>
        <div class="pf-alici-card">
          <div class="pf-alici-icon">🏢</div>
          <div>
            <div class="pf-alici-name">${A.unvan}</div>
            <div class="pf-alici-det">${A.adres}</div>
            <span class="pf-alici-vkn">${A.vd} &nbsp;·&nbsp; VKN: ${A.vkn}</span>
          </div>
        </div>
      </div>

      <table class="pf-table">
        <thead>
          <tr>
            <th>#</th>
            <th>ÜRÜN ADI</th>
            <th class="r">MİKTAR</th>
            <th class="r">BİRİM FİYAT</th>
            <th class="r">TOPLAM FİYAT</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <div class="pf-bottom">
        <div class="pf-conds">
          <div class="pf-cond"><b>TESLİMAT:</b> Nakliye satıcıya aittir.</div>
          <div class="pf-cond"><b>ÖDEME:</b> Banka yolu ile EFT/Havale</div>
          <div class="pf-cond"><b>FİYAT:</b> TL olarak verilmiştir.</div>
          <div class="pf-cond"><b>GEÇERLİLİK:</b> 5 gündür.</div>
        </div>
        <div class="pf-totals">
          <div class="pf-total-row">
            <div class="lbl">TOPLAM</div>
            <div class="val">${fmt(toplam)} TL</div>
          </div>
          <div class="pf-total-row">
            <div class="lbl">KDV %1</div>
            <div class="val">KDV DAHİL</div>
          </div>
          <div class="pf-total-row genel">
            <div class="lbl">GENEL TOPLAM</div>
            <div class="val">${fmt(toplam)} TL</div>

        </div>
      </div>

      <div class="pf-banka">
        <div class="pf-banka-title">Banka Hesap Bilgileri</div>
        <div class="pf-banka-sep"></div>
        <div class="pf-banka-item"><b>BANKA:</b><span>${S.banka}</span></div>
        <div class="pf-banka-item"><b>IBAN:</b><span>${S.iban}</span></div>
      </div>

      <div class="pf-footer">
        <div class="pf-imza-box">
          <div class="pf-imza-line"></div>
          <div class="pf-imza-lbl">DÜZENLEYEN / İMZA</div>
        </div>
        <div class="pf-watermark">
          ${S.unvan}<br>${tarihTR}
        </div>
        <div class="pf-imza-box">
          <div class="pf-imza-line"></div>

        </div>
      </div>

    </div>
    <div class="pf-botbar"></div>
  </div>`;

  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';
}

function yeniOlustur() {
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('previewWrap').innerHTML = '';
  tutarInp.value = '';
}
</script>
